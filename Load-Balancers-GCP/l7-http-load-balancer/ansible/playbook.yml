---
# Playbook: Configure NGINX with Path-Based Responses
# Targets VMs discovered via GCP dynamic inventory with the "l7-http-lb" tag.
#
# This playbook:
#   1. Installs NGINX
#   2. Configures path-based responses (/api → JSON, /images → text, / → default)
#   3. Each path returns hostname to verify L7 request-level distribution

- name: Configure web servers with path-based routing
  hosts: tag_l7_http_lb
  become: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: Deploy NGINX config with path-based routing
      ansible.builtin.copy:
        content: |
          server {
              listen 80;
              server_name _;

              # API endpoint — returns JSON
              location /api {
                  default_type application/json;
                  return 200 '{"server": "$hostname", "path": "/api", "message": "API response from L7 backend"}\n';
              }

              # Images endpoint — returns plain text
              location /images {
                  default_type text/plain;
                  return 200 "Image server: $hostname\nPath: /images\nThis would serve static images in production.\n";
              }

              # Default — returns plain text with hostname
              location / {
                  default_type text/plain;
                  return 200 "Hello from $hostname\nPath: $request_uri\nServed via L7 HTTP Load Balancer\n";
              }

              access_log /var/log/nginx/access.log;
          }
        dest: /etc/nginx/sites-available/default
        owner: root
        group: root
        mode: "0644"
      notify: Restart nginx

    - name: Ensure nginx is started and enabled
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: true

  handlers:
    - name: Restart nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted
