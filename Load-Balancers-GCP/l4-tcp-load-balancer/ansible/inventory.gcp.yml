---
plugin: google.cloud.gcp_compute
projects:
  - "kkgcplabs01-002"
zones:
  - us-central1-c
filters:
  - "tags.items:nginx"
auth_kind: application
hostvar_expressions:
  ansible_host: networkInterfaces[0].accessConfigs[0].natIP
keyed_groups:
  - key: tags['items'] | list
    prefix: tag
compose:
  ansible_user: "saikat"
  ansible_ssh_private_key_file: ~/.ssh/id_rsa
