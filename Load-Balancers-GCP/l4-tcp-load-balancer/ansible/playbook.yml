---
# Playbook: Configure NGINX Web Servers
# Targets all VMs discovered via GCP dynamic inventory with the "nginx" tag.

- name: Configure web servers
  hosts: tag_nginx
  become: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: Set custom index page
      ansible.builtin.copy:
        content: "Hello from {{ ansible_hostname }}"
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: "0644"

    - name: Ensure nginx is started and enabled
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: true
